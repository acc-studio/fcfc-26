name: Poll live results

# Pulls the ESPN World Cup feed and writes live scores / scorers / final
# results into Firestore (scripts/poll.mjs), then sends push notifications
# (scripts/notify.ts) for the changes. The app streams scores to clients via its
# onSnapshot listeners; team form is derived client-side from those same matches
# (no separate feed), so one external trigger keeps everything on one cadence.
#
# Setup: add these repo secrets (Settings -> Secrets and variables -> Actions),
# the same values as .env.local:
#   NEXT_PUBLIC_FIREBASE_API_KEY, NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN,
#   NEXT_PUBLIC_FIREBASE_PROJECT_ID, NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET,
#   NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID, NEXT_PUBLIC_FIREBASE_APP_ID
# Plus ARBITER_CODE (the value in the config/arbiter doc) — the poller writes
# results as a transient arbiter, which the tightened rules require.
# For push notifications (scripts/notify.ts) also add a VAPID keypair:
#   NEXT_PUBLIC_VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY, VAPID_SUBJECT (mailto:…)
#   Generate once with: npx web-push generate-vapid-keys --json
#   (the public key must also be set in Vercel so the client can subscribe).
#
# Reliable cadence: GitHub's `schedule` is best-effort and drops runs under load,
# so the cron above is only a fallback. For a guaranteed interval, trigger this
# workflow from an external scheduler (e.g. free cron-job.org) — currently ~2 min:
#   POST https://api.github.com/repos/acc-studio/fcfc-26/actions/workflows/poll-results.yml/dispatches
#   Headers: Authorization: Bearer <PAT>, Accept: application/vnd.github+json,
#            X-GitHub-Api-Version: 2022-11-28
#   Body: {"ref":"main"}
# PAT = a fine-grained token scoped to THIS repo with Actions: read and write.
#
# Cost note: GitHub Actions minutes are unlimited on public repos, capped
# (2,000/mo) on private ones. Disable the workflow once the tournament is over.

on:
  schedule:
    # Best-effort fallback only. GitHub's scheduler delays/drops cron runs under
    # load (top-of-hour worst), so a guaranteed cadence comes from an external
    # trigger hitting the workflow_dispatch API (see README/CLAUDE.md). Offset
    # off :00 to dodge the busiest slots.
    - cron: '8,23,38,53 * * * *'
  workflow_dispatch:           # allow manual runs from the Actions tab
    inputs:
      dates:
        description: 'Backfill date YYYYMMDD or range YYYYMMDD-YYYYMMDD (blank = today)'
        required: false
        default: ''

# Never let two polls overlap; drop a queued run if one is in flight.
concurrency:
  group: poll-results
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      ARBITER_CODE: ${{ secrets.ARBITER_CODE }}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
      VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Poll live scores
        run: node scripts/poll.mjs "${{ inputs.dates }}"
      # Diff the fresh results against last run's snapshot and web-push the
      # changes (results, goals, knockout unlocks, bet reminders, table moves,
      # Analytics-Lab title changes). No-ops if the VAPID secrets are unset.
      - name: Send push notifications
        run: npx tsx scripts/notify.ts
