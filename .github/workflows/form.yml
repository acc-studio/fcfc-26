name: Refresh team form

# Pulls each nation's last-5 results into Firestore `teams/{name}` docs for the
# form indicators. Form only changes when a team plays, so a few times a day is
# plenty — GitHub's best-effort schedule is fine here (unlike the live poller,
# this doesn't need a guaranteed cadence). Run manually anytime from the Actions
# tab. Needs the same secrets as the poller, including ARBITER_CODE.

on:
  schedule:
    - cron: '17 */6 * * *'      # ~4x/day, offset off the hour
  workflow_dispatch: {}

concurrency:
  group: refresh-form
  cancel-in-progress: false

jobs:
  form:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node scripts/form.mjs
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          ARBITER_CODE: ${{ secrets.ARBITER_CODE }}
